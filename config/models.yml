# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# Qwen3.5-35B-A3B is a native MoE (35B total / ~3B active per token).
# Served via stock vllm/vllm-openai:cu130-nightly with NVFP4 quantization.
# Model loaded from HF cache (~/.cache/huggingface mounted into container).
# 131K context window. ~80% GPU memory utilization on DGX Spark GB10.
#
# NOTE: Do NOT use hellohal2064/vllm-qwen3.5-gb10:latest — that image has a
# custom entrypoint that hardcodes its own model path and flags, which conflicts
# with anything passed via docker run args (duplicate flags, positional arg clash).
#
# REQUIRED env vars for FlashInfer MoE FP4 backend on SM121:
#   VLLM_USE_FLASHINFER_MOE_FP4=1
#   VLLM_FLASHINFER_MOE_BACKEND=latency
# -----------------------------------------------------------------------------
brain:
  name: qwen35-35b-a3b
  hf_repo: Qwen/Qwen3.5-35B-A3B
  local_path: /opt/models/qwen35-35b-a3b
  port: 8000
  served_name: qwen3.5-35b
  docker_image: vllm/vllm-openai:cu130-nightly
  gpu_memory_utilization: 0.80
  max_model_len: 131072
  quantization: petit_nvfp4
  load_format: fastsafetensors
  max_num_seqs: 32
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  extra_env:
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
    VLLM_FLASHINFER_MOE_BACKEND: latency
  # --- SWAP EXAMPLES ---
  # name: qwen3-vl-32b
  # hf_repo: Qwen/Qwen3-VL-32B-Instruct-FP8
  # local_path: /opt/models/qwen3-vl-32b
  # docker_image: vllm/vllm-openai:cu130-nightly
  # gpu_memory_utilization: 0.70
  # max_model_len: 131072
  # quantization: petit_nvfp4
  # load_format: fastsafetensors
  # max_num_seqs: 8
  # tool_call_parser: qwen3_coder
  # reasoning_parser: qwen3

