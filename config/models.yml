# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, vision, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# Qwen3.5-35B-A3B-FP8 is a native multimodal MoE (35B total / ~3B active per token).
# ~34.6 GiB FP8 weights. Verified 48–50 tok/s on single DGX Spark GB10 with
# hellohal2064 SM121-patched image + FP8 Marlin env vars.
# 262K context window. No separate vision encoder.
#
# REQUIRES SM121-patched image: hellohal2064/vllm-qwen3.5-gb10:latest
# Stock vllm/vllm-openai:cu130-nightly has a CMake arch guard bug ("12.0f" vs
# "12.0a") that silently excludes GB10 from native kernel compilation, dropping
# throughput to ~13 tok/s. The hellohal2064 image fixes this.
#
# REQUIRED env vars (set in extra_env below) for FP8 Marlin backend on SM121:
#   VLLM_FLASHINFER_MOE_BACKEND=latency
#   VLLM_TEST_FORCE_FP8_MARLIN=1
#   VLLM_MARLIN_USE_ATOMIC_ADD=0
# -----------------------------------------------------------------------------
brain:
  name: qwen35-35b-a3b-fp8
  hf_repo: Qwen/Qwen3.5-35B-A3B-FP8
  local_path: /opt/models/qwen35-35b-a3b-fp8
  port: 8000
  served_name: qwen35-35b
  docker_image: hellohal2064/vllm-qwen3.5-gb10:latest
  gpu_memory_utilization: 0.75        # ~91GB on 121.69GiB visible — ~35GB weights + ~56GB KV cache
  max_model_len: 262144               # 262K context
  kv_cache_dtype: fp8
  max_num_seqs: 32
  max_num_batched_tokens: 8192
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  limit_mm_per_prompt: '{"image": 10}'  # multimodal: allow up to 10 images per request
  extra_env:
    VLLM_FLASHINFER_MOE_BACKEND: latency
    VLLM_TEST_FORCE_FP8_MARLIN: "1"
    VLLM_MARLIN_USE_ATOMIC_ADD: "0"
  # --- SWAP BACK (previous model) ---
  # name: qwen35-27b-fp8
  # hf_repo: Qwen/Qwen3.5-27B-FP8
