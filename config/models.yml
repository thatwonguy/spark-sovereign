  # reasoning_parser: qwen3
  # (no extra_env needed)
  # --- SWAP EXAMPLES ---
  # name: qwen3-vl-32b
  # hf_repo: Qwen/Qwen3-VL-32B-Instruct-FP8
  # local_path: /opt/models/qwen3-vl-32b
