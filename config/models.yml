# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, vision, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# Qwen3.6-35B-A3B-FP8: Gated DeltaNet + MoE hybrid (35B total / 3B active).
# Drop-in upgrade from Qwen3.5-35B-A3B-FP8 — same parsers, same image.
# +3.4 pts SWE-bench Verified (73.4%), +11 pts Terminal-Bench 2.0 (51.5%).
# Gated DeltaNet (linear attention for 3/4 of layers) dramatically reduces
# KV cache pressure at long contexts — native 262K vs 131K on Qwen3.5.
# ~53 tok/s on Spark (community tg32 benchmark: 52.73 tok/s).
# Requires vLLM >= 0.19.0 — verify cu130-nightly version before deploying.
# Released April 16, 2026 — Apache 2.0.
# -----------------------------------------------------------------------------
brain:
  name: qwen36-35b-a3b-fp8
  hf_repo: Qwen/Qwen3.6-35B-A3B-FP8
  local_path: /opt/models/qwen36-35b-a3b-fp8
  port: 8000
  served_name: qwen36-35b
  docker_image: vllm/vllm-openai:cu130-nightly
  gpu_memory_utilization: 0.80        # ~97GB on 121.69GiB visible — ~55GB weights + ~42GB KV cache; ~24GB left for ASR/TTS/OS
  max_model_len: 262144               # 262K native context (DeltaNet linear attention keeps KV cache manageable)
  kv_cache_dtype: fp8
  max_num_seqs: 16                    # Single-user — lower = less scheduling overhead per decode step
  max_num_batched_tokens: 8192        # Large batch for improved throughput
  tool_call_parser: qwen3_coder       # Same parser as Qwen3.5 — same family
  reasoning_parser: qwen3             # Same parser as Qwen3.5 — same family
  extra_env:
    VLLM_FLASHINFER_MOE_BACKEND: latency    # Required for SM12.1 MoE kernels on Blackwell
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1        # Allow 262K context without warning
  limit_mm_per_prompt: '{"image": 10}'  # multimodal: allow up to 10 images per request
  # --- SWAP EXAMPLES ---
  # Previous v3.0 model (rollback):
  # name: qwen35-35b-a3b-fp8
  # hf_repo: Qwen/Qwen3.5-35B-A3B-FP8
  # local_path: /opt/models/qwen35-35b-a3b-fp8
  # served_name: qwen35-35b
  # max_model_len: 131072
  #
  # Dense 27B (slower but higher quality per active param):
  # name: qwen36-27b-fp8
  # hf_repo: Qwen/Qwen3.6-27B-FP8
  # local_path: /opt/models/qwen36-27b-fp8
  # gpu_memory_utilization: 0.75
  # max_model_len: 262144
  # max_num_seqs: 32
  # tool_call_parser: qwen3_coder
  # reasoning_parser: qwen3

