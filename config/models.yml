# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# RedHatAI/Qwen3.5-122B-A10B-NVFP4 — pre-quantized NVFP4 checkpoint.
# 122B total / ~10B active per token. NVFP4 weights ~75GB.
# Runtime: stock vllm/vllm-openai:cu130-nightly (NOT a Red Hat image).
#
# Quantization: DO NOT pass --quantization. The checkpoint embeds its own
# quantization config; vLLM auto-detects it. Passing --quantization externally
# conflicts with the embedded config and will error.
#
# MoE backend: --moe_backend flashinfer_cutlass per Red Hat's own model card.
# (NOT flashinfer_latency — that's for BF16/FP8 MoE, not NVFP4 kernels.)
#
# ⚠ Known issue: vLLM bug #35519 — Qwen3.5 NVFP4 on ARM64/GB10 may crash
#   with CUDA illegal instruction during generation (~31 tok/s then dies).
#   RedHatAI checkpoint uses llm-compressor, not modelopt — may behave
#   differently. Watch `docker logs brain -f` on first generation.
#
# Memory: 0.90 * 121.69GB = ~109GB → ~75GB weights + ~34GB KV cache.
# Context capped at 65536 to stay within KV cache budget.
# -----------------------------------------------------------------------------
brain:
  name: qwen35-122b-a10b-nvfp4
  hf_repo: RedHatAI/Qwen3.5-122B-A10B-NVFP4
  local_path: /opt/models/qwen35-122b-a10b-nvfp4
  port: 8000
  served_name: qwen3.5-122b
  docker_image: vllm/vllm-openai:cu130-nightly
  gpu_memory_utilization: 0.90        # ~109GB — ~75GB weights + ~34GB KV cache
  max_model_len: 65536                # 64K context — sized for available KV cache
  moe_backend: flashinfer_cutlass     # per Red Hat model card; required for NVFP4 kernels
  load_format: safetensors
  max_num_seqs: 16                    # reduced vs 35B — larger active param count
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  # no quantization field — checkpoint is self-describing, vLLM auto-detects
  # no extra_env — moe_backend is now a CLI flag, not an env var
  # --- SWAP BACK (35B FP8 on-the-fly, ~35–45 tok/s) ---
  # name: qwen35-35b-a3b
  # hf_repo: Qwen/Qwen3.5-35B-A3B
  # local_path: /opt/models/qwen35-35b-a3b
  # served_name: qwen3.5-35b
  # gpu_memory_utilization: 0.80
  # max_model_len: 131072
  # quantization: fp8
  # load_format: safetensors
  # max_num_seqs: 32
  # --- SWAP EXAMPLES ---
  # name: qwen3-vl-32b
  # hf_repo: Qwen/Qwen3-VL-32B-Instruct-FP8
  # local_path: /opt/models/qwen3-vl-32b
  # gpu_memory_utilization: 0.70
  # max_model_len: 131072
  # quantization: fp8
  # max_num_seqs: 8
  # tool_call_parser: qwen3_coder
  # reasoning_parser: qwen3

