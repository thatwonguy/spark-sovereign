    image: pgvector/pgvector:pg17
    port: 5432
    data_path: /opt/pgvector
  searxng:
    image: searxng/searxng:latest
    port: 8088                        # 8080 reserved for NemoClaw OpenShell gateway
    config_path: /opt/searxng
  nemoclaw:
    ui_port: 18789

# -----------------------------------------------------------------------------
# MEMORY MAP (128GB unified — April 2026)
# -----------------------------------------------------------------------------
# Component                  Allocated   Note
# Qwen3.5-35B-A3B FP8         91.3 GB   0.75 util (~55GB weights + ~36GB KV cache)
# ASR (nemotron-speech)        3.0 GB   always-on
# TTS (magpie_tts)             1.4 GB   always-on
# Embeddings (nomic)           0.4 GB   always-on
# pgvector + PostgreSQL        2.0 GB   always-on
# SearXNG                      0.5 GB   always-on
# NemoClaw + OpenClaw          1.0 GB   always-on
# OS + Docker + vLLM           6.0 GB   always-on
# ─────────────────────────────────────────────────
# TOTAL                       105.6 GB   (on 121.69GiB visible to CUDA)
# HEADROOM                     16.1 GB   ✅ safe — MoE only activates 3B/token
# NOTE: Effective weight memory is ~55GB (vs ~105GB for dense 27B).
#       The remaining ~36GB within the 0.75 util goes to KV cache,
#       which is MORE KV cache than the 27B had — better for long contexts.
