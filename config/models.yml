# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, vision, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# Qwen3.5-35B-A3B-FP8: MoE (35B total / 3B active per token).
# Same Qwen3.5 family as the 27B dense — same tool calling parser, same
# reasoning parser — but only 3B params active per token → ~49 tok/s on Spark
# vs ~14-30 tok/s for the dense 27B.  Community-confirmed: surpasses
# Qwen3-235B-A22B benchmarks with 3B active (better RL + architecture).
# FP8 weights ~55 GB → frees ~50 GB headroom vs the dense 27B.
# 131K context window.  Prefix caching big win for OpenClaw memory.md preprompt.
# -----------------------------------------------------------------------------
brain:
  name: qwen35-35b-a3b-fp8
  hf_repo: Qwen/Qwen3.5-35B-A3B-FP8
  local_path: /opt/models/qwen35-35b-a3b-fp8
  port: 8000
  served_name: qwen35-35b
  docker_image: vllm/vllm-openai:cu130-nightly
  gpu_memory_utilization: 0.75        # ~91GB on 121.69GiB visible — ~55GB weights + ~36GB KV cache; ~30GB left for ASR/TTS/OS
  max_model_len: 131072               # 131K context
  kv_cache_dtype: fp8
  max_num_seqs: 32                    # High concurrency — MoE handles this well with 3B active
  max_num_batched_tokens: 8192        # Large batch for improved throughput
  tool_call_parser: qwen3_coder       # Same parser as Qwen3.5-27B — same family
  reasoning_parser: qwen3             # Same parser as Qwen3.5-27B — same family
  extra_env:
    VLLM_FLASHINFER_MOE_BACKEND: latency    # Required for SM12.1 MoE kernels on Blackwell
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1        # Allow 131K context without warning
  limit_mm_per_prompt: '{"image": 10}'  # multimodal: allow up to 10 images per request
  # --- SWAP EXAMPLES ---
  # Dense 27B (slower but higher quality per active param):
  # name: qwen35-27b-fp8
  # hf_repo: Qwen/Qwen3.5-27B-FP8
  # local_path: /opt/models/qwen35-27b-fp8
  # gpu_memory_utilization: 0.75
  # max_model_len: 262144
  # max_num_seqs: 32
  # tool_call_parser: qwen3_coder
  # reasoning_parser: qwen3
  #
  # MXFP4 variant (~70 tok/s, requires custom vllm 0.17.0 + SM121 patches):
  # name: qwen35-35b-a3b-mxfp4
  # hf_repo: Qwen/Qwen3.5-35B-A3B-MXFP4
  # local_path: /opt/models/qwen35-35b-a3b-mxfp4
  # gpu_memory_utilization: 0.75
  # max_model_len: 131072

