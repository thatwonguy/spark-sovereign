# =============================================================================
# MODEL REGISTRY — spark-sovereign
# =============================================================================
# This is the single source of truth for all models in the stack.
# To swap any model:
#   1. Edit the relevant section below
#   2. Re-run the corresponding script (scripts/02_download_models.sh, etc.)
#   3. Restart the affected Docker container
#
# All scripts source this file via `yq` or the helper `config/parse_models.sh`
# =============================================================================

# -----------------------------------------------------------------------------
# BRAIN — daily driver: coding, vision, agentic, reasoning, tool calls
# -----------------------------------------------------------------------------
# Qwen3.5-35B-A3B is a native multimodal MoE (35B total / 3B active per token).
# Outperforms Qwen3-VL-32B on vision, coding, and agent benchmarks.
# ~50 tok/s sustained on single DGX Spark GB10 with FP8 + standard vLLM.
# 262K context window. No separate vision encoder — no VL profiling OOM.
# -----------------------------------------------------------------------------
brain:
  name: qwen35-35b-a3b
  hf_repo: Qwen/Qwen3.5-35B-A3B-FP8
  local_path: /opt/models/qwen35-35b-a3b
  port: 8000
  served_name: qwen35-35b-a3b
  docker_image: vllm/vllm-openai:cu130-nightly  # nvcr.io/nvidia/vllm:26.02-py3 is vLLM 0.15.1 — too old for qwen3_5_moe arch
  gpu_memory_utilization: 0.60        # ~73GB on 121.69GiB visible — balanced for vLLM + ASR + TTS headroom
  max_model_len: 262144               # 262K context
  kv_cache_dtype: fp8
  max_num_seqs: 32                    # Double concurrency for better parallel throughput
  max_num_batched_tokens: 8192        # Double batch size for improved inference efficiency
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  # --- SWAP EXAMPLES ---
  # name: qwen3-vl-32b
  # hf_repo: Qwen/Qwen3-VL-32B-Instruct-FP8
  # local_path: /opt/models/qwen3-vl-32b
  # docker_image: vllm/vllm-openai:cu130-nightly
  # gpu_memory_utilization: 0.70      # VL profiling peak needs ~80GB — start Brain before any other GPU model
  # max_model_len: 131072
  # kv_cache_dtype: fp8
  # max_num_seqs: 8
  # tool_call_parser: qwen3_coder
  # reasoning_parser: qwen3

