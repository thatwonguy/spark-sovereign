# -----------------------------------------------------------------------------
# INFRASTRUCTURE — not swappable models, just reference
# -----------------------------------------------------------------------------
infrastructure:
  pgvector:
    image: pgvector/pgvector:pg17
    port: 5432
    data_path: /opt/pgvector
  searxng:
    image: searxng/searxng:latest
    port: 8088                        # 8080 reserved for NemoClaw OpenShell gateway
    config_path: /opt/searxng
  nemoclaw:
    ui_port: 18789

